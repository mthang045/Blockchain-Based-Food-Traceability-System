# Production Profile Configuration
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate

# Production Database (update with your actual values)
spring.datasource.url=jdbc:mysql://your-db-host:3306/food_traceability_prod
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Enable blockchain for production
blockchain.enabled=true
blockchain.network.url=${BLOCKCHAIN_URL}

# Security
jwt.secret=${JWT_SECRET}

# Logging
logging.level.com.blockchain.food=INFO
