# Development Profile Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop

# Development Database
spring.datasource.url=jdbc:mysql://localhost:3306/food_traceability_dev?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password

# Disable blockchain for local development
blockchain.enabled=false

# Logging
logging.level.com.blockchain.food=DEBUG
