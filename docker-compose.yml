version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: food-traceability-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - food-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 10s
      retries: 10

  ganache:
    image: trufflesuite/ganache:latest
    container_name: food-traceability-ganache
    ports:
      - "8545:8545"
    command: >
      --wallet.mnemonic "test test test test test test test test test test test junk"
      --server.host 0.0.0.0
      --chain.chainId 1337
    networks:
      - food-network

  backend:
    build: ./backend
    container_name: food-traceability-backend
    environment:
      PORT: 3000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/food-traceability
      RPC_URL: http://ganache:8545
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS:-your_contract_address_here}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5175
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
      ganache:
        condition: service_started
    networks:
      - food-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: food-traceability-frontend
    ports:
      - "5175:80"
    depends_on:
      - backend
    networks:
      - food-network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  food-network:
    driver: bridge
